
    <html>

        <title>Orders</title>

        <style>

            body {
                font-family: Arial;
                padding: 20px;

            table {
                border-collapse: collapse;
                width: 100%;
            }

            th, td {
                border: 1px solid black;
                padding: 8px;
                vertical-align: top;
            }

            th {
                background-color: #dddddd;
                position: sticky;
                top: 0;
            }

                background-color: #f0f0f0;
            }
            
    
            li.has-note {
                font-weight: bold;
                color: #0056b3;
            }

        </style>
    </head>
